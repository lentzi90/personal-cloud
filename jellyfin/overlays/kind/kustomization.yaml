apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jellyfin

labels:
- includeSelectors: true
  pairs:
    environment: kind

resources:
- ../../base
- namespace.yaml
- httproute.yaml

components:
- ../../components/keycloak-sso

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: jellyfin-sso-config
  files:
  - SSO-Auth.xml
