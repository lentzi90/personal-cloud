apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak
labels:
- pairs:
    environment: kind
resources:
- ../../base
- httproute.yaml

components:
- ../../components/homelab-realm

patches:
- target:
    kind: Keycloak
    name: keycloak
  patch: |-
    - op: add
      path: /spec/http/httpEnabled
      value: true
    - op: remove
      path: /spec/http/tlsSecret
# Patch OpenCloud web client (index 2) redirect URIs for KinD environment
- target:
    kind: KeycloakRealmImport
    name: homelab-realm
  patch: |-
    - op: add
      path: /spec/realm/clients/2/redirectUris
      value:
        - https://opencloud.local/*
    - op: add
      path: /spec/realm/clients/2/webOrigins
      value:
        - https://opencloud.local
    - op: add
      path: /spec/realm/clients/2/attributes/post.logout.redirect.uris
      value: https://opencloud.local/*
# Patch Jellyfin client (index 6) redirect URIs for KinD environment
- target:
    kind: KeycloakRealmImport
    name: homelab-realm
  patch: |-
    - op: add
      path: /spec/realm/clients/6/redirectUris
      value:
        - https://jellyfin.local/sso/OID/redirect/Keycloak
    - op: add
      path: /spec/realm/clients/6/webOrigins
      value:
        - https://jellyfin.local
    - op: add
      path: /spec/realm/clients/6/baseUrl
      value: https://jellyfin.local
