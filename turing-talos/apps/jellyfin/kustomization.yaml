apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jellyfin
labels:
- pairs:
    environment: turing-talos
resources:
- ../../../jellyfin/base
- namespace.yaml
- httproute.yaml
- jellyfin-pv.yaml

components:
- ../../../jellyfin/components/keycloak-sso

patches:
- path: jellyfin-data-pvc.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: jellyfin-sso-config
  files:
  - SSO-Auth.xml
