apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opencloud

labels:
- includeSelectors: true
  pairs:
    environment: kind

resources:
- ../../base
- namespace.yaml
- httproute.yaml

components:
- ../../components/keycloak-oidc

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: opencloud-env
  envs:
  - config.env
  - oidc.env
- name: opencloud-csp
  files:
  - csp.yaml
