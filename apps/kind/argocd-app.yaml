apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: argocd/overlays/kind
    repoURL: https://github.com/lentzi90/personal-cloud.git
    targetRevision: HEAD
  ignoreDifferences:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    jqPathExpressions:
    - .spec.parentRefs[].group
    - .spec.parentRefs[].kind
    - .spec.rules[].backendRefs[].group
    - .spec.rules[].backendRefs[].kind
    - .spec.rules[].backendRefs[].weight
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
