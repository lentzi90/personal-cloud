apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kind-deploy
spec:
  steps:
  - try:
    # Edit all apps to use the target revision instead of HEAD
    - script:
        timeout: 10s
        content: |
          sed -i "s HEAD ${TARGET_REVISION} g" apps/kind/*-app.yaml
  - try:
    # Apply cert-manager manifests
    - script:
        timeout: 1m
        content: kubectl apply -k cert-manager/overlays/kind
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cert-manager-webhook
            namespace: cert-manager
          status:
            (conditions[?type == 'Available']):
            - status: 'True'
  - try:
    # Install Gateway API CRDs (needed before argocd, which includes an HTTPRoute)
    - script:
        timeout: 1m
        content: kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.1/standard-install.yaml
  - try:
    # Apply argocd manifests
    - script:
        timeout: 1m
        content: kubectl apply --server-side -k argocd/overlays/kind
    # Verify that the argocd-server deployment is ready
    - assert:
        timeout: 5m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: argocd-server
            namespace: argocd
          status:
            # filter conditions array to keep elements where `type == 'Available'`
            # and assert there's a single element matching the filter
            # and that this element status is `True`
            (conditions[?type == 'Available']):
            - status: 'True'
  # cert-manager
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/cert-manager-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cert-manager
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: cert-manager
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: cert-manager
        namespace: cert-manager
    - podLogs:
        name: cert-manager
        namespace: cert-manager
  # metallb
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/metallb-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: metallb
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: metallb
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: controller
        namespace: metallb
    - describe:
        apiVersion: v1
        kind: Pod
        name: speaker
        namespace: metallb-system
    - podLogs:
        name: controller
        namespace: metallb-system
    - podLogs:
        name: speaker
        namespace: metallb-system
  # envoy-gateway
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/envoy-gateway-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: envoy-gateway
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: envoy-gateway
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: envoy-gateway
        namespace: envoy-gateway-system
    - podLogs:
        name: envoy-gateway
        namespace: envoy-gateway-system
  # envoy-gateways (GatewayClass and Gateway resources)
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/envoy-gateways-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: envoy-gateways
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: envoy-gateways
        namespace: argocd
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        name: envoy
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        name: envoy-private
        namespace: envoy-gateway-system
    - describe:
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        name: envoy-public
        namespace: envoy-gateway-system
  # argocd - Note: won't be ready until the gateway has an external IP
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply --server-side -f apps/kind/argocd-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: argocd
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: argocd
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: argocd
        namespace: argocd
    - podLogs:
        name: argocd
        namespace: argocd
  # external-secrets
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/external-secrets-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: external-secrets
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: external-secrets
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: external-secrets
        namespace: external-secrets
    - podLogs:
        namespace: external-secrets
  - try:
    # Create secret store and token secret
    - script:
        timeout: 10s
        content: |
          kubectl -n external-secrets create secret generic bitwarden-access-token-test --from-literal=token=${BITWARDEN_ACCESS_TOKEN}
          kubectl apply -f secret-store/test-secretstore.yaml
    - assert:
        timeout: 10s
        resource:
          apiVersion: external-secrets.io/v1
          kind: ClusterSecretStore
          metadata:
            name: bitwarden-test
          status:
            # filter conditions array to keep elements where `type == 'Ready'`
            # and assert there's a single element matching the filter
            # and that this element status is `True`
            (conditions[?type == 'Ready']):
            - status: 'True'
  # Cloudnatice-pg
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/cloudnative-pg-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cloudnative-pg
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: cloudnative-pg
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: cnpg
        namespace: cnpg-system
    - podLogs:
        name: cnpg
        namespace: cnpg-system
  # hetzner-cloud-webhook
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/hetzner-cloud-webhook-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: hetzner-cloud-webhook
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: hetzner-cloud-webhook
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: cert-manager-webhook-hetzner-cloud
        namespace: cert-manager
    - podLogs:
        name: cert-manager-webhook-hetzner-cloud
        namespace: cert-manager
  # keycloak-operator
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/keycloak-operator-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: keycloak-operator
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: keycloak-operator
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: keycloak-operator
        namespace: keycloak
    - podLogs:
        name: keycloak-operator
        namespace: keycloak
  # keycloak
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/keycloak-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: keycloak
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: keycloak
        namespace: argocd
    - describe:
        apiVersion: k8s.keycloak.org/v2alpha1
        kind: Keycloak
        name: keycloak
        namespace: keycloak
    - describe:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        name: keycloak-db
        namespace: keycloak
    - podLogs:
        name: keycloak-0
        namespace: keycloak
    - podLogs:
        name: keycloak-db-1
        namespace: keycloak
  # Verify homelab realm import
  - try:
    - assert:
        timeout: 10m
        resource:
          apiVersion: k8s.keycloak.org/v2alpha1
          kind: KeycloakRealmImport
          metadata:
            name: homelab-realm
            namespace: keycloak
          status:
            (conditions[?type == 'Done']):
            - status: 'True'
    catch:
    - describe:
        apiVersion: k8s.keycloak.org/v2alpha1
        kind: KeycloakRealmImport
        name: homelab-realm
        namespace: keycloak
    - script:
        timeout: 30s
        content: |
          echo "=== Keycloak Realm Import Status ==="
          kubectl get keycloakrealmimport -n keycloak -o yaml
          echo "=== Keycloak Logs ==="
          kubectl logs -n keycloak -l app=keycloak --tail=100
  # pi-hole
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/pi-hole-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: pi-hole
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: pi-hole
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: pi-hole
        namespace: pi-hole
    - podLogs:
        name: pi-hole
        namespace: pi-hole
  # wireguard
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/wireguard-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: wireguard
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: wireguard
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: wireguard
        namespace: wireguard
    - podLogs:
        name: wireguard
        namespace: wireguard
  # jellyfin
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/jellyfin-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: jellyfin
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: jellyfin
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: jellyfin
        namespace: jellyfin
    - podLogs:
        name: jellyfin
        namespace: jellyfin
  # opencloud
  - try:
    - script:
        timeout: 10s
        content: kubectl -n argocd apply -f apps/kind/opencloud-app.yaml
    - assert:
        timeout: 10m
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: opencloud
            namespace: argocd
          status:
            health:
              status: Healthy
            sync:
              status: Synced
    catch:
    - describe:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        name: opencloud
        namespace: argocd
    - describe:
        apiVersion: v1
        kind: Pod
        name: opencloud
        namespace: opencloud
    - podLogs:
        name: opencloud
        namespace: opencloud
  # Verify OpenCloud OIDC configuration
  - try:
    - script:
        timeout: 30s
        content: |
          echo "=== Verifying OpenCloud OIDC Configuration ==="
          kubectl get configmap opencloud-env -n opencloud -o jsonpath='{.data.OC_OIDC_ISSUER}'
          echo ""
          kubectl get configmap opencloud-env -n opencloud -o jsonpath='{.data.PROXY_AUTOPROVISION_ACCOUNTS}'
          echo ""
          kubectl get configmap opencloud-env -n opencloud -o jsonpath='{.data.OCIS_EXCLUDE_RUN_SERVICES}'
          echo ""
    catch:
    - script:
        timeout: 30s
        content: |
          echo "=== OpenCloud ConfigMap ==="
          kubectl get configmap opencloud-env -n opencloud -o yaml
          echo "=== OpenCloud Deployment ==="
          kubectl get deployment opencloud -n opencloud -o yaml
  # Verify Jellyfin SSO plugin configuration
  - try:
    - script:
        timeout: 30s
        content: |
          echo "=== Verifying Jellyfin SSO Plugin Configuration ==="
          kubectl get configmap jellyfin-sso-config -n jellyfin -o jsonpath='{.data.SSO-Auth\.xml}' | grep -q 'OidEndpoint' && echo "SSO-Auth.xml present and contains OidEndpoint"
          echo ""
    catch:
    - script:
        timeout: 30s
        content: |
          echo "=== Jellyfin SSO ConfigMap ==="
          kubectl get configmap jellyfin-sso-config -n jellyfin -o yaml
          echo "=== Jellyfin Deployment ==="
          kubectl get deployment jellyfin -n jellyfin -o yaml
